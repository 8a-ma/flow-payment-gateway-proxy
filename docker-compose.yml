services:
  redis-db:
    image: redis:7-alpine
    container_name: redis-flow-proxy
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app-dev:
    build:
      context: .
      dockerfile: deployment/Dockerfile.dev
    container_name: flow-proxy-dev
    depends_on:
      redis-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Sobrescribimos el HOST para que apunte al nombre del servicio de arriba
      - REDIS_HOST=redis-db
    volumes:
      - .:/app
      - /app/node_modules # Evita que el node_modules local pise al del contenedor
    stdin_open: true # Para que nodemon funcione bien
    tty: true